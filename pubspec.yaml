name: masderm_app
description: Masderm Portugal — Gestão de Parcerias com Influenciadoras
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  csv: ^6.0.0
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  http: ^1.2.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/influencers.csv
    - assets/data/parcerias.csv
    - assets/data/produtos.csv
